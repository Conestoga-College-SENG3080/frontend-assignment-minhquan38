name: publish-to-github-pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️ - Cache dependencies ⚡ - Install dependencies 🔧
        uses: ./.github/workflows/setup-node

      - name: Remove duplicate config file 🗑️
        run: rm -f next.config.js

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Build with Next.js 🏗️
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check Next.js config
        run: |
          echo "=== Checking what config files exist ==="
          ls -la next.config.* || echo "No next.config files found"
          echo ""
          echo "=== Checking for out directory ==="
          if [ -d "./out" ]; then
            echo "out directory found"
            ls -la ./out | head -10
          else
            echo "out directory NOT found"
            ls -la
            exit 1
          fi
      
      - name: Upload artifact 📡
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publish to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
